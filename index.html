<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mystery Drop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <div class="card">
      <h1>🎁 Mystery Drop</h1>
      <p class="sub">Open boxes • Collect coins • Find rare drops</p>

      <div id="box" class="box">🎁</div>

      <button id="openBtn">🎮 Open Box</button>

      <div id="result" class="result">
        დააჭირე ღილაკს და გახსენი ყუთი
      </div>

      <div class="stats">
        <div>🪙 Coins: <span id="coins">0</span></div>
        <div>🎁 Boxes: <span id="boxes">0</span></div>
        <div>💎 Rare: <span id="rare">0</span></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
